<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>MGPS - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-7">
      <div class="card shadow-sm">
        <div class="card-body">
          <h4 class="card-title mb-3">User Registration</h4>
          <form method="post" action="/register">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Employee ID (EMP ID)</label>
                <input name="empId" type="text" class="form-control" required />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Name</label>
                <input name="name" type="text" class="form-control" required />
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Designation</label>
                <input name="designation" type="text" class="form-control" />
              </div>
              <div class="col-md-6 mb-3">
                <label class="form-label">Department Code</label>
                <input name="deptCode" type="text" class="form-control" />
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Password</label>
              <input name="password" type="password" class="form-control" required />
              <div class="form-text">Use a strong password; it will be stored as a secure hash.</div>
            </div>

            <div class="mb-3">
              <label class="form-label">Role / Clearance Levels</label>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="roles" value="EMP" id="rEmp" />
                <label class="form-check-label" for="rEmp">Emp</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="roles" value="E1" id="rE1" />
                <label class="form-check-label" for="rE1">E1</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="roles" value="EL" id="rEL" />
                <label class="form-check-label" for="rEL">EL</label>
              </div>
              <div class="form-check">
                <input class="form-check-input" type="checkbox" name="roles" value="CISF" id="rCISF" />
                <label class="form-check-label" for="rCISF">CISF</label>
              </div>
            </div>

            <div class="d-grid">
              <button type="submit" class="btn btn-success">Register</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
