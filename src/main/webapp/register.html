<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MGPS Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container-fluid">
    <a class="navbar-brand" href="home.html">MGPS</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarNav">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
        <li class="nav-item"><a class="nav-link active" href="register.html">Register</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container py-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm">
        <div class="card-body">
          <h3 class="card-title mb-4">Create an MGPS Account</h3>
          <form id="registerForm">
            <div id="errorAlert" class="alert alert-danger" style="display: none;"></div>
            <div class="row gy-3">
              <div class="col-md-6">
                <label class="form-label">Employee ID (EMP ID)</label>
                <input id="empId" name="empId" type="text" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Name</label>
                <input id="name" name="name" type="text" class="form-control" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Designation</label>
                <input id="designation" name="designation" type="text" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">Department Code</label>
                <input id="deptCode" name="deptCode" type="text" class="form-control">
              </div>
              <div class="col-md-6">
                <label class="form-label">Password</label>
                <input id="password" name="password" type="password" class="form-control" required>
              </div>
            </div>
            <div class="mt-4">
              <label class="form-label">Role / Clearance Levels</label>
              <div class="row">
                <div class="col-sm-6 col-md-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="roles" value="EMP" id="roleEmp">
                    <label class="form-check-label" for="roleEmp">Emp</label>
                  </div>
                </div>
                <div class="col-sm-6 col-md-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="roles" value="E1" id="roleE1">
                    <label class="form-check-label" for="roleE1">E1</label>
                  </div>
                </div>
                <div class="col-sm-6 col-md-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="roles" value="EL" id="roleEL">
                    <label class="form-check-label" for="roleEL">EL</label>
                  </div>
                </div>
                <div class="col-sm-6 col-md-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" name="roles" value="CISF" id="roleCISF">
                    <label class="form-check-label" for="roleCISF">CISF</label>
                  </div>
                </div>
              </div>
            </div>
            <div class="mt-4 d-grid">
              <button type="submit" class="btn btn-success">Register</button>
            </div>
          </form>
          <p class="text-center mt-3">Already registered? <a href="login.html">Login here</a></p>
        </div>
      </div>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/api.js"></script>
<script>
  document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const empId = document.getElementById('empId').value;
    const name = document.getElementById('name').value;
    const designation = document.getElementById('designation').value;
    const deptCode = document.getElementById('deptCode').value;
    const password = document.getElementById('password').value;
    
    const rolesCheckboxes = document.querySelectorAll('input[name="roles"]:checked');
    const roles = Array.from(rolesCheckboxes).map(cb => cb.value);
    
    const errorAlert = document.getElementById('errorAlert');

    try {
      const result = await ApiService.register(empId, name, designation, deptCode, password, roles);
      if (result.success) {
        alert('Registration successful! Please login.');
        window.location.href = 'login.html';
      }
    } catch (error) {
      errorAlert.textContent = error.message || 'Registration failed';
      errorAlert.style.display = 'block';
    }
  });
</script>
</body>
</html>
